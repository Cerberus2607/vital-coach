<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#10b981">
<title>Vital-Coach</title>
<style>
:root{
  --bg:#f2f4f7; --card:#ffffff; --text:#1a1d21; --muted:#6b7280; --border:#e5e7eb;
  --accent:#10b981; --accent-soft:#d1fae5; --blue:#3b82f6; --blue-soft:#dbeafe;
  --warn:#f59e0b; --warn-soft:#fef3c7; --danger:#ef4444; --danger-soft:#fee2e2;
  --purple:#8b5cf6; --shadow:0 1px 3px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg:#0f1115; --card:#1a1d23; --text:#e8eaed; --muted:#9aa0a6; --border:#2b2f37;
  --accent:#34d399; --accent-soft:#0d3b2e; --blue:#60a5fa; --blue-soft:#172a46;
  --warn:#fbbf24; --warn-soft:#3d2e08; --danger:#f87171; --danger-soft:#43181a;
  --purple:#a78bfa; --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.45;
  padding-bottom:calc(70px + env(safe-area-inset-bottom));
  transition:background .25s,color .25s;
}
.wrap{max-width:520px;margin:0 auto;padding:12px 14px;}
header.app{
  position:sticky;top:0;z-index:20;background:var(--bg);
  display:flex;align-items:center;justify-content:space-between;
  max-width:520px;margin:0 auto;padding:12px 14px 8px;
}
header.app h1{font-size:1.25rem;margin:0;display:flex;align-items:center;gap:8px;}
header.app h1 .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);
  display:inline-flex;align-items:center;justify-content:center;font-size:17px;}
.icon-btn{
  background:var(--card);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:7px 11px;font-size:16px;cursor:pointer;box-shadow:var(--shadow);
}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:12px;box-shadow:var(--shadow);
}
.card h3{margin:0 0 10px;font-size:.95rem;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.muted{color:var(--muted);font-size:.82rem;}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.spread{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.big{font-size:1.9rem;font-weight:700;line-height:1.1;}
.bar{height:9px;background:var(--border);border-radius:6px;overflow:hidden;margin:6px 0 3px;}
.bar>div{height:100%;border-radius:6px;background:var(--accent);transition:width .3s;}
.bar>div.over{background:var(--danger);}
.bar>div.warn{background:var(--warn);}
.bar>div.blue{background:var(--blue);}
.bar>div.purple{background:var(--purple);}
.macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;}
.macro-grid .m{font-size:.8rem;}
.macro-grid b{font-size:.92rem;}
.btn{
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:9px 14px;font-size:.9rem;font-weight:600;cursor:pointer;
}
[data-theme="dark"] .btn{color:#08130e;}
.btn.sec{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn.small{padding:6px 10px;font-size:.82rem;}
.btn.danger{background:var(--danger);color:#fff;}
.btn:active{opacity:.75;}
.meal{border-top:1px solid var(--border);padding-top:10px;margin-top:10px;}
.meal:first-of-type{border-top:none;margin-top:0;padding-top:0;}
.meal-head{display:flex;justify-content:space-between;align-items:center;}
.meal-head b{font-size:.9rem;}
.entry{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:6px 0;font-size:.86rem;border-bottom:1px dashed var(--border);
}
.entry:last-child{border-bottom:none;}
.entry .del{color:var(--danger);background:none;border:none;font-size:15px;cursor:pointer;padding:2px 6px;}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.date-nav b{font-size:1rem;}
.tip{
  display:flex;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:8px;
  font-size:.86rem;align-items:flex-start;background:var(--blue-soft);
}
.tip.good{background:var(--accent-soft);}
.tip.warn{background:var(--warn-soft);}
.tip.danger{background:var(--danger-soft);}
.tip .ic{font-size:18px;line-height:1.2;}
.tip .bt{margin-top:6px;}
input,select{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:9px 10px;font-size:.95rem;width:100%;
}
input:focus,select:focus{outline:2px solid var(--accent);border-color:transparent;}
label.fl{display:block;font-size:.78rem;color:var(--muted);margin:10px 0 4px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.stat{background:var(--bg);border-radius:12px;padding:10px;text-align:center;}
.stat b{display:block;font-size:1.05rem;}
.stat span{font-size:.72rem;color:var(--muted);}
canvas{width:100%;height:auto;display:block;}
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:var(--card);border-top:1px solid var(--border);
  display:flex;max-width:520px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom);
}
nav.tabs button{
  flex:1;background:none;border:none;color:var(--muted);cursor:pointer;
  padding:9px 4px 7px;font-size:.68rem;display:flex;flex-direction:column;align-items:center;gap:2px;
}
nav.tabs button .ni{font-size:21px;}
nav.tabs button.active{color:var(--accent);font-weight:700;}
.page{display:none;}
.page.active{display:block;}
.hidden{display:none !important;}
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
}
.sheet{
  background:var(--card);width:100%;max-width:520px;border-radius:18px 18px 0 0;
  max-height:88vh;overflow-y:auto;padding:14px;
}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.food-item{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:9px 4px;border-bottom:1px solid var(--border);cursor:pointer;font-size:.88rem;
}
.food-item:active{background:var(--bg);}
.food-item .fi-sub{font-size:.74rem;color:var(--muted);}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 0;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  white-space:nowrap;background:var(--bg);border:1px solid var(--border);color:var(--text);
  border-radius:20px;padding:5px 12px;font-size:.78rem;cursor:pointer;
}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
[data-theme="dark"] .chip.active{color:#08130e;}
.portion-btns{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.streak{
  display:inline-flex;align-items:center;gap:5px;background:var(--warn-soft);
  border-radius:20px;padding:4px 11px;font-size:.8rem;font-weight:600;
}
table.wk{width:100%;border-collapse:collapse;font-size:.8rem;}
table.wk th{color:var(--muted);font-weight:600;text-align:right;padding:5px 4px;font-size:.72rem;}
table.wk td{text-align:right;padding:5px 4px;border-top:1px solid var(--border);}
table.wk th:first-child,table.wk td:first-child{text-align:left;}
.ok{color:var(--accent);font-weight:700;}
.bad{color:var(--danger);}
.water-btns button{font-size:.85rem;}
.disclaimer{font-size:.72rem;color:var(--muted);line-height:1.5;}
.avatar-img{width:24px;height:24px;border-radius:50%;object-fit:cover;display:block;}
.avatar-big{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);}
.avatar-ph{width:64px;height:64px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:28px;border:2px dashed var(--border);}
.moti{cursor:pointer;background:linear-gradient(135deg,var(--accent-soft),var(--blue-soft));}
.moti .q{font-style:italic;line-height:1.5;}
</style>
</head>
<body>
<header class="app">
  <h1><span class="logo">💚</span>Vital-Coach</h1>
  <div class="row">
    <span id="streakBadge" class="streak hidden">🔥 <span id="streakNum">0</span></span>
    <button class="icon-btn" id="themeBtn" onclick="cycleTheme()" title="Hell/Dunkel">🌗</button>
    <button class="icon-btn" id="avatarBtn" onclick="showTab('profil')" title="Profil" style="padding:5px 7px">👤</button>
  </div>
</header>
<div class="wrap">
  <section id="page-heute" class="page active"></section>
  <section id="page-koerper" class="page"></section>
  <section id="page-coach" class="page"></section>
  <section id="page-profil" class="page"></section>
</div>
<nav class="tabs">
  <button id="tab-heute" class="active" onclick="showTab('heute')"><span class="ni">📅</span>Heute</button>
  <button id="tab-koerper" onclick="showTab('koerper')"><span class="ni">⚖️</span>Körper</button>
  <button id="tab-coach" onclick="showTab('coach')"><span class="ni">🧠</span>Coach</button>
  <button id="tab-profil" onclick="showTab('profil')"><span class="ni">⚙️</span>Profil</button>
</nav>
<div id="overlay" class="overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <div class="sheet-head"><b id="modalTitle">Essen hinzufügen</b>
      <button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div id="modalBody"></div>
  </div>
</div>

function age(){
  const b=new Date(state.profile.birth),n=new Date();
  let a=n.getFullYear()-b.getFullYear();
  if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;
  return a;
}
function sortedBody(){return state.bodyLog.filter(e=>e.weight!=null).slice().sort((a,b)=>a.date<b.date?-1:1);}
function latestWeight(){const s=sortedBody();return s.length?s[s.length-1].weight:state.profile.startWeight;}
function bmi(){const h=state.profile.height/100;return latestWeight()/(h*h);}
function targets(){
  const p=state.profile,w=latestWeight();
  const bmr=(p.sex==="m"?5:-161)+10*w+6.25*p.height-5*age();
  const tdee=bmr*p.activity;
  const kcal=p.kcalOverride||Math.max(Math.round((tdee-500)/10)*10,1500);
  const prot=p.protOverride||Math.round(p.targetWeight*1.8);
  const fat=Math.round(w*0.8);
  const carbs=Math.max(0,Math.round((kcal-prot*4-fat*9)/4));
  return {kcal,prot,fat,carbs,water:2500,sleep:7,bmr:Math.round(bmr),tdee:Math.round(tdee)};
}
function getDayRec(key){
  if(!state.days[key])state.days[key]={meals:{f:[],m:[],a:[],s:[]},water:0,sleep:null,mtx:false};
  return state.days[key];
}
function totals(day){
  const t={k:0,p:0,f:0,c:0,alc:false};
  if(!day)return t;
  for(const m of Object.values(day.meals))for(const e of m){
    t.k+=e.k;t.p+=e.p;t.f+=e.f;t.c+=e.c;if(e.alc)t.alc=true;
  }
  t.k=Math.round(t.k);t.p=Math.round(t.p);t.f=Math.round(t.f);t.c=Math.round(t.c);
  return t;
}
function streak(){
  let n=0;const d=new Date();
  for(;;){
    const day=state.days[dkey(d)];
    const has=day&&Object.values(day.meals).some(m=>m.length);
    if(has){n++;d.setDate(d.getDate()-1);}
    else if(n===0&&dkey(d)===todayKey()){d.setDate(d.getDate()-1);} // heute noch leer zählt nicht als Abbruch
    else break;
    if(n>999)break;
  }
  return n;
}
function weightTrend(){ // kg pro Woche über letzte 28 Tage
  const s=sortedBody();
  const cut=new Date();cut.setDate(cut.getDate()-28);
  let pts=s.filter(e=>parseKey(e.date)>=cut);
  if(pts.length<2)pts=s.slice(-2);
  if(pts.length<2)return null;
  const x0=parseKey(pts[0].date).getTime();
  const xs=pts.map(e=>(parseKey(e.date).getTime()-x0)/86400000);
  const ys=pts.map(e=>e.weight);
  const n=xs.length,mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;
  let num=0,den=0;
  for(let i=0;i<n;i++){num+=(xs[i]-mx)*(ys[i]-my);den+=(xs[i]-mx)**2;}
  if(den===0)return null;
  return (num/den)*7;
}

/* ================= Coach ================= */
function coachTips(){
  const tips=[];
  const key=todayKey(), day=getDayRec(key), t=totals(day), tg=targets();
  const hour=new Date().getHours(), wd=new Date().getDay();
  const push=(cls,ic,txt,btn)=>tips.push({cls,ic,txt,btn});
  // MTX
  if(wd===Number(state.profile.mtxDay)){
    if(!day.mtx)push("warn","💉","Heute ist dein MTX-Tag (20 mg). Denk an die Spritze — und ggf. an die Folsäure am Folgetag laut ärztlicher Vorgabe.",
      "<button class='btn small' onclick='markMtx()'>Erledigt ✓</button>");
    else push("good","💉","MTX heute erledigt. Stark!");
  }
  // Alkohol + MTX
  if(t.alc)push("danger","🍺","Du hast heute Alkohol getrackt. Unter wöchentlichem MTX ist Alkohol eine zusätzliche Leberbelastung — besser weglassen oder auf die alkoholfreie Variante wechseln.");
  // Protein
  const pPct=t.p/tg.prot*100;
  if(pPct>=100)push("good","💪",`Proteinziel erreicht (${t.p} g / ${tg.prot} g) — optimal für den Muskelerhalt beim Abnehmen.`);
  else if(hour>=15&&pPct<50)push("warn","💪",`Erst ${t.p} g von ${tg.prot} g Protein. Unter Mounjaro besonders wichtig: Plane fürs Abendessen eine große Proteinquelle ein (Quark, Fisch, Hähnchen).`);
  else if(hour>=19&&pPct<85)push("warn","💪",`Dir fehlen noch ${Math.max(0,tg.prot-t.p)} g Protein. Ein Magerquark (250 g) liefert 30 g.`);
  // Kalorien
  const rest=tg.kcal-t.k;
  if(t.k>tg.kcal*1.1)push("danger","🔥",`${t.k-tg.kcal} kcal über deinem Tagesziel. Kein Drama — ein Tag macht keinen Trend. Morgen einfach normal weiter.`);
  else if(hour>=18&&rest>0&&rest<tg.kcal*0.35)push("good","🔥",`Noch ${rest} kcal übrig — passt gut für ein proteinreiches Abendessen.`);
  else if(hour>=18&&t.k<tg.kcal*0.4)push("warn","🍽️",`Du hast heute erst ${t.k} kcal gegessen. Unter Mounjaro fehlt oft der Appetit — zu wenig essen kostet aber Muskeln. Iss lieber klein und proteinreich als gar nicht.`);
  // Wasser
  if(day.water>=tg.water)push("good","💧","Trinkziel erreicht!");
  else if(hour>=14&&day.water<tg.water*0.5)push("warn","💧",`Erst ${(day.water/1000).toFixed(1)} l von ${(tg.water/1000).toFixed(1)} l getrunken. Mounjaro dämpft das Durstgefühl — jetzt ein großes Glas Wasser.`);
  // Wiegen
  const lastB=sortedBody().slice(-1)[0];
  if(lastB){
    const daysSince=Math.round((new Date()-parseKey(lastB.date))/86400000);
    if(daysSince>=4)push("info","⚖️",`Letzter Gewichtseintrag vor ${daysSince} Tagen. Trag dein Gewicht ein (morgens, nüchtern), damit der Trend aussagekräftig bleibt.`);
  }
  // Trend & Prognose
  const tr=weightTrend();
  if(tr!=null){
    const w=latestWeight(),goal=state.profile.targetWeight;
    if(w>goal&&tr<-0.05){
      const weeks=(w-goal)/(-tr);
      const d=new Date();d.setDate(d.getDate()+Math.round(weeks*7));
      push("good","📉",`Aktueller Trend: ${tr.toFixed(2).replace(".",",")} kg/Woche. Bleibt das so, erreichst du ${goal} kg ca. am ${d.toLocaleDateString("de-DE",{day:"numeric",month:"long",year:"numeric"})}.`);
      if(tr<-1)push("warn","🐢",`Über 1 kg/Woche Verlust ist auf Dauer zu schnell — Risiko Muskelabbau. Halte das Protein hoch und iss nicht unter ${Math.round(tg.bmr*0.9)} kcal.`);
    } else if(w>goal&&Math.abs(tr)<=0.05&&sortedBody().length>=4){
      push("info","📊","Dein Gewicht stagniert seit ein paar Wochen. Optionen: Schritte erhöhen, Protein prüfen, Portionen ehrlich wiegen — oder mit deinem Arzt über die Mounjaro-Dosis sprechen.");
    } else if(w<=goal){
      push("good","🏁",`Zielgewicht ${goal} kg erreicht! Zeit, mit dem Coach auf Erhaltungskalorien (~${tg.tdee} kcal) umzustellen.`);
    }
  }
  // Schlaf (7-Tage-Schnitt)
  let sl=[],d2=new Date();
  for(let i=0;i<7;i++){const dd=state.days[dkey(d2)];if(dd&&dd.sleep)sl.push(dd.sleep);d2.setDate(d2.getDate()-1);}
  if(sl.length>=3){
    const avg=sl.reduce((a,b)=>a+b,0)/sl.length;
    if(avg<6.5)push("warn","😴",`Ø nur ${avg.toFixed(1).replace(".",",")} Std. Schlaf in den letzten Tagen. Unter 6,5 Std. steigt das Hungerhormon Ghrelin — Schlaf ist Teil deines Abnehmplans.`);
  }
  // Meilensteine
  const lost=state.profile.startWeight-latestWeight();
  const total=state.profile.startWeight-state.profile.targetWeight;
  if(total>0&&lost>0.3){
    const pct=Math.min(100,Math.round(lost/total*100));
    if(pct>=25)push("good","🏆",`${pct} % deines Wegs geschafft: ${lost.toFixed(1).replace(".",",")} von ${total.toFixed(1).replace(".",",")} kg sind weg. Das hast DU gemacht.`);
  }
  // Streak
  const st=streak();
  if([7,14,21,30,50,75,100].includes(st))push("good","🎉",`${st} Tage am Stück getrackt — das ist keine Phase mehr, das ist eine Gewohnheit. Stark!`);
  else if(st>=3)push("good","🔥",`${st} Tage in Folge getrackt — Dranbleiben schlägt Perfektion.`);
  // Tages-Tipp (rotierend, altersgerecht)
  const doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/86400000);
  push("info","🧠","Tipp des Tages: "+AGE_TIPS[doy%AGE_TIPS.length]);
  return tips;
}

    }
    if(!es.length)html+=`<div class="muted" style="padding:4px 0">Noch nichts eingetragen</div>`;

  }
  html+=`</div>
  <div class="card"><h3>💧 Wasser <span class="muted">${(day.water/1000).toFixed(2).replace(".",",")} / ${(tg.water/1000).toFixed(1).replace(".",",")} l</span></h3>

    <div class="row water-btns" style="margin-top:8px">
      <button class="btn small sec" onclick="addWater(250)">+ Glas (250 ml)</button>
      <button class="btn small sec" onclick="addWater(500)">+ Flasche (500 ml)</button>
      <button class="btn small sec" onclick="addWater(-250)">−250 ml</button>
    </div>
  </div>
  <div class="card"><h3>😴 Schlaf</h3>
    <div class="row"><input type="number" step="0.5" min="0" max="14" style="max-width:110px"
      value="${day.sleep??""}" placeholder="Std." onchange="setSleep(this.value)"> <span class="muted">Stunden letzte Nacht (Ziel: ${tg.sleep}–8)</span></div>
  </div>`;
  $("#page-heute").innerHTML=html;
  $("#streakNum").textContent=streak();
  $("#streakBadge").classList.toggle("hidden",streak()<1);

/* ============ Barcode-Scanner & Open Food Facts ============ */
let scanStream=null,scanLoop=null,zxReader=null;
function loadZXing(){
  return new Promise((ok,fail)=>{
    if(window.ZXing)return ok();
    const s=document.createElement("script");
    s.src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
    s.onload=()=>ok();s.onerror=()=>fail(new Error("Scanner-Bibliothek nicht ladbar (offline?)"));
    document.head.appendChild(s);
  });
}
async function startCamera(){
  const v=$("#scanVideo"),st=$("#scanStatus");
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    st.textContent="Keine Kamera verfügbar — tippe die Barcode-Nummer unten ein.";return;
  }
  try{
    if("BarcodeDetector" in window){
      const det=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});
      scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      v.srcObject=scanStream;await v.play();
      st.textContent="Halte den Barcode ruhig vor die Kamera…";
      scanLoop=setInterval(async()=>{
        try{
          const codes=await det.detect(v);
          if(codes.length){const c=codes[0].rawValue;stopScan();lookupBarcode(c);}
        }catch(e){}
      },400);
    }else{
      st.textContent="Scanner wird geladen…";
      await loadZXing();
      zxReader=new ZXing.BrowserMultiFormatReader();
      st.textContent="Halte den Barcode ruhig vor die Kamera…";
      zxReader.decodeFromVideoDevice(null,"scanVideo",(res,err)=>{
        if(res){const c=res.getText();stopScan();lookupBarcode(c);}
      });
    }
  }catch(e){
    st.textContent="Kamera nicht nutzbar ("+e.name+"). Erlaube den Kamerazugriff oder tippe die Nummer unten ein.";
  }
}
function stopScan(){
  if(scanLoop){clearInterval(scanLoop);scanLoop=null;}
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  if(zxReader){try{zxReader.reset();}catch(e){}zxReader=null;}
}
async function lookupBarcode(code){
  if(!code)return;
  const st=$("#scanStatus");if(st)st.textContent="Suche Produkt "+code+"…";
  try{
    const r=await fetch("https://world.openfoodfacts.org/api/v2/product/"+encodeURIComponent(code)+".json?fields=product_name,product_name_de,brands,nutriments,serving_quantity");
    const d=await r.json();
    if(d.status!==1||!d.product)throw new Error("Produkt nicht in der Datenbank");
    addOffProduct(d.product);
  }catch(e){
    if(st)st.textContent="❌ "+e.message+". Nochmal versuchen oder Nummer eintippen.";
    else alert("Produkt nicht gefunden: "+e.message);
  }
}
async function offSearch(){
  const q=(modal.query||"").trim();
  if(!q){alert("Gib erst einen Suchbegriff ein, z. B. „Wasa Knäckebrot“.");return;}
  const list=$("#foodList");
  if(list)list.innerHTML='<div class="muted" style="padding:14px 0">🌐 Suche online in Open Food Facts…</div>';
  try{
    const qs="?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=15&fields=product_name,product_name_de,brands,nutriments,serving_quantity,code";
    let d=null;
    for(const host of ["world.openfoodfacts.org","de.openfoodfacts.org"]){
      try{
        const r=await fetch("https://"+host+"/cgi/search.pl"+qs);
        if(!r.ok)continue;
        d=await r.json();break;
      }catch(e){}
    }
    if(!d)throw new Error("Server nicht erreichbar");
    const ps=(d.products||[]).filter(p=>p.nutriments&&p.nutriments["energy-kcal_100g"]!=null);
    if(!ps.length){list.innerHTML='<div class="muted" style="padding:14px 0">Online nichts Passendes gefunden. Lege es als eigenes Lebensmittel an.</div>';return;}
    modal.offResults=ps;
    list.innerHTML=ps.map((p,i)=>{
      const name=(p.product_name_de||p.product_name||"?")+(p.brands?" · "+p.brands.split(",")[0]:"");
      return `<div class="food-item" onclick="pickOff(${i})">
        <span>${esc(name)}<div class="fi-sub">${Math.round(p.nutriments["energy-kcal_100g"])} kcal · ${(+p.nutriments.proteins_100g||0).toFixed(1)} g Protein je 100 g · 🌐 Open Food Facts</div></span>
        <span style="font-size:18px;color:var(--accent)">＋</span></div>`;
    }).join("");
  }catch(e){
    if(list)list.innerHTML='<div class="muted" style="padding:14px 0">Online-Suche fehlgeschlagen — bist du offline?</div>';
  }
}
function pickOff(i){addOffProduct(modal.offResults[i]);}
function addOffProduct(p){
  const nut=p.nutriments||{};
  const kcal=Math.round(+nut["energy-kcal_100g"]||0);
  if(!kcal){alert("Für dieses Produkt sind keine Kalorienangaben hinterlegt.");return;}
  const name=((p.product_name_de||p.product_name||"Produkt")+(p.brands?" ("+p.brands.split(",")[0].trim()+")":"")).slice(0,70);
  let f=state.customFoods.find(x=>x.n===name);
  if(!f){
    f={n:name,k:kcal,p:+(+nut.proteins_100g||0).toFixed(1),f:+(+nut.fat_100g||0).toFixed(1),c:+(+nut.carbohydrates_100g||0).toFixed(1),cat:6};
    const sq=parseFloat(p.serving_quantity);
    if(sq>0){f.pn="Portion";f.pg=Math.round(sq);}
    state.customFoods.push(f);save();
  }
  modal.selIdx=allFoods().findIndex(x=>x.n===name);
  modal.mode="detail";modal.grams=null;renderModal();
}

function saveBody(){
  const w=parseFloat($("#bw").value),bf=parseFloat($("#bf").value),wa=parseFloat($("#bwaist").value);
  if(isNaN(w)&&isNaN(bf)&&isNaN(wa))return;
  const key=todayKey();
  let e=state.bodyLog.find(x=>x.date===key);
  if(!e){e={date:key,weight:null,bf:null,waist:null};state.bodyLog.push(e);}
  if(!isNaN(w))e.weight=w;
  if(!isNaN(bf))e.bf=bf;
  if(!isNaN(wa))e.waist=wa;
  save();renderKoerper();
}
function drawWeightChart(){
  const cv=$("#wChart");if(!cv)return;
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||300,H=220;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext&&cv.getContext("2d");
  if(!ctx)return;
  ctx.scale(dpr,dpr);
  const cs=getComputedStyle(document.documentElement);
  const col=t=>cs.getPropertyValue(t).trim();
  const pts=sortedBody();
  if(pts.length<2){ctx.fillStyle=col("--muted");ctx.font="13px sans-serif";ctx.fillText("Noch zu wenige Einträge",20,40);return;}
  const goal=state.profile.targetWeight;
  const xs=pts.map(e=>parseKey(e.date).getTime());
  const ys=pts.map(e=>e.weight);
  const x0=Math.min(...xs),x1=Math.max(...xs);
  let y0=Math.min(...ys,goal)-1,y1=Math.max(...ys)+1;
  const pad={l:34,r:8,t:10,b:24};
  const X=v=>pad.l+(v-x0)/(x1-x0||1)*(W-pad.l-pad.r);
  const Y=v=>pad.t+(y1-v)/(y1-y0||1)*(H-pad.t-pad.b);
  // Gitter
  ctx.strokeStyle=col("--border");ctx.fillStyle=col("--muted");ctx.font="10px sans-serif";ctx.lineWidth=1;
  for(let g=Math.ceil(y0);g<=Math.floor(y1);g+=(y1-y0>12?4:2)){
    ctx.beginPath();ctx.moveTo(pad.l,Y(g));ctx.lineTo(W-pad.r,Y(g));ctx.stroke();
    ctx.fillText(g+"",4,Y(g)+3);
  }
  // Ziellinie
  ctx.strokeStyle=col("--warn");ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(pad.l,Y(goal));ctx.lineTo(W-pad.r,Y(goal));ctx.stroke();
  ctx.setLineDash([]);
  // Linie
  ctx.strokeStyle=col("--accent");ctx.lineWidth=2.2;ctx.beginPath();
  pts.forEach((e,i)=>{const x=X(parseKey(e.date).getTime()),y=Y(e.weight);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.stroke();
  // Punkte
  ctx.fillStyle=col("--accent");
  pts.forEach(e=>{ctx.beginPath();ctx.arc(X(parseKey(e.date).getTime()),Y(e.weight),3,0,7);ctx.fill();});
  // Datumslabels
  ctx.fillStyle=col("--muted");
  ctx.fillText(parseKey(pts[0].date).toLocaleDateString("de-DE",{month:"short",year:"2-digit"}),pad.l,H-8);
  const lastLbl=parseKey(pts[pts.length-1].date).toLocaleDateString("de-DE",{day:"2-digit",month:"short"});
  ctx.fillText(lastLbl,W-pad.r-ctx.measureText(lastLbl).width,H-8);
}

/* ================= Coach-Tab ================= */
function renderCoach(){
  const tg=targets();
  const tips=coachTips();
  let rows="";
  const d=new Date();
  for(let i=0;i<7;i++){
    const key=dkey(d);
    const day=state.days[key],t=totals(day);
    const has=day&&Object.values(day.meals).some(m=>m.length);
    const kOk=has&&t.k<=tg.kcal*1.05&&t.k>=tg.kcal*0.5;
    const pOk=has&&t.p>=tg.prot*0.9;
    const wOk=day&&day.water>=tg.water;
    const sOk=day&&day.sleep>=6.5;
    rows+=`<tr><td>${fmtShort(key)}</td>
      <td class="${has?(kOk?"ok":""):""}">${has?t.k:"–"}</td>
      <td class="${has?(pOk?"ok":"bad"):""}">${has?t.p+" g":"–"}</td>
      <td class="${day&&day.water?(wOk?"ok":""):""}">${day&&day.water?(day.water/1000).toFixed(1).replace(".",","):"–"}</td>
      <td class="${day&&day.sleep?(sOk?"ok":"bad"):""}">${day&&day.sleep?String(day.sleep).replace(".",","):"–"}</td></tr>`;
    d.setDate(d.getDate()-1);
  }
  // Wochenschnitt
  let sk=0,sp=0,n=0;const d3=new Date();
  for(let i=0;i<7;i++){const dd=state.days[dkey(d3)];if(dd){const t=totals(dd);if(t.k>0){sk+=t.k;sp+=t.p;n++;}}d3.setDate(d3.getDate()-1);}
  $("#page-coach").innerHTML=`
  <div class="card"><h3>🧠 Dein Coach heute <span class="streak">🔥 ${streak()} Tage</span></h3>
    ${tips.map(tipHtml).join("")}
  </div>
  <div class="card"><h3>📅 Letzte 7 Tage</h3>
    <table class="wk">
      <tr><th>Tag</th><th>kcal</th><th>Protein</th><th>Wasser l</th><th>Schlaf h</th></tr>
      ${rows}
    </table>
    <div class="muted" style="margin-top:8px">Ø ${n?Math.round(sk/n):0} kcal · Ø ${n?Math.round(sp/n):0} g Protein an ${n} getrackten Tagen.
    Ziele: ${tg.kcal} kcal · ${tg.prot} g Protein · 2,5 l Wasser · 7–8 h Schlaf.</div>
  </div>
  <div class="card"><h3>🎯 Deine Zielwerte</h3>
    <div class="grid3">
      <div class="stat"><b>${tg.kcal}</b><span>kcal/Tag (Abnehmen)</span></div>
      <div class="stat"><b>${tg.prot} g</b><span>Protein/Tag</span></div>
      <div class="stat"><b>${tg.tdee}</b><span>kcal Erhaltung</span></div>
    </div>
    <div class="muted" style="margin-top:8px">Basis: Mifflin-St-Jeor-Formel mit deinen aktuellen Werten (${latestWeight()} kg, ${state.profile.height} cm, ${age()} J.), Aktivitätsfaktor ${state.profile.activity}, moderates Defizit von ~500 kcal. Protein: 1,8 g je kg Zielgewicht für Muskelerhalt. Anpassbar im Profil.</div>
  </div>`;
}

/* ================= Profil ================= */
function setP(k,v){state.profile[k]=v;save();renderAll();}
function renderProfil(){
  const p=state.profile,tg=targets();
  $("#page-profil").innerHTML=`
  <div class="card"><h3>🪪 Dein Profil</h3>
    <div class="row" style="align-items:flex-start">
      ${p.photo?`<img class="avatar-big" src="${p.photo}">`:`<div class="avatar-ph">👤</div>`}
      <div style="flex:1;min-width:180px">
        <label class="fl">Name</label>
        <input value="${esc(p.name||"")}" placeholder="Dein Name" onchange="setP('name',this.value)">
        <div class="row" style="margin-top:10px">
          <label class="btn sec small" style="display:inline-block;cursor:pointer">📷 Foto wählen<input type="file" accept="image/*" class="hidden" onchange="setPhoto(this)"></label>
          ${p.photo?`<button class="btn danger small" onclick="setP('photo',null)">Entfernen</button>`:""}
        </div>
        <div class="muted" style="margin-top:6px">Das Foto bleibt nur auf diesem Gerät gespeichert.</div>
      </div>
    </div>
  </div>
  <div class="card"><h3>👤 Persönliche Daten</h3>
    <div class="grid2">
      <div><label class="fl">Geburtsdatum</label><input type="date" value="${p.birth}" onchange="setP('birth',this.value)"></div>
      <div><label class="fl">Größe (cm)</label><input type="number" value="${p.height}" onchange="setP('height',parseFloat(this.value)||174)"></div>
      <div><label class="fl">Zielgewicht (kg)</label><input type="number" step="0.5" value="${p.targetWeight}" onchange="setP('targetWeight',parseFloat(this.value)||82)"></div>
      <div><label class="fl">Aktivität</label>
        <select onchange="setP('activity',parseFloat(this.value))">
          <option value="1.25" ${p.activity===1.25?"selected":""}>Sitzend</option>
          <option value="1.35" ${p.activity===1.35?"selected":""}>Überwiegend sitzend (Außendienst)</option>
          <option value="1.5" ${p.activity===1.5?"selected":""}>Aktiv</option>
          <option value="1.7" ${p.activity===1.7?"selected":""}>Sehr aktiv</option>
        </select></div>
    </div>
  </div>
  <div class="card"><h3>💉 Medikamente</h3>
    <label class="fl">MTX-Spritzentag (wöchentliche Erinnerung)</label>
    <select onchange="setP('mtxDay',parseInt(this.value))">
      ${WEEKDAYS.map((w,i)=>`<option value="${i}" ${p.mtxDay===i?"selected":""}>${w}</option>`).join("")}
    </select>
    <div class="muted" style="margin-top:6px">Der Coach erinnert dich am gewählten Tag und warnt bei getracktem Alkohol.</div>
  </div>
  <div class="card"><h3>🎯 Ziele überschreiben (optional)</h3>
    <div class="grid2">
      <div><label class="fl">Kalorienziel (leer = automatisch ${tg.kcal})</label>
        <input type="number" value="${p.kcalOverride??""}" placeholder="auto" onchange="setP('kcalOverride',this.value?parseInt(this.value):null)"></div>
      <div><label class="fl">Proteinziel g (leer = automatisch ${Math.round(p.targetWeight*1.8)})</label>
        <input type="number" value="${p.protOverride??""}" placeholder="auto" onchange="setP('protOverride',this.value?parseInt(this.value):null)"></div>
    </div>
  </div>
  <div class="card"><h3>🎨 Darstellung</h3>
    <select onchange="setP('theme',this.value);applyTheme()">
      <option value="auto" ${p.theme==="auto"?"selected":""}>Automatisch (Systemeinstellung)</option>
      <option value="light" ${p.theme==="light"?"selected":""}>Hell</option>
      <option value="dark" ${p.theme==="dark"?"selected":""}>Dunkel</option>
    </select>
  </div>
  <div class="card"><h3>💾 Daten</h3>
    <div class="row">
      <button class="btn sec" onclick="exportData()">Backup exportieren</button>
      <label class="btn sec" style="display:inline-block;cursor:pointer">Importieren<input type="file" accept=".json" class="hidden" onchange="importData(this)"></label>
      <button class="btn danger small" onclick="resetAll()">Alles zurücksetzen</button>
    </div>
    <div class="muted" style="margin-top:8px">Alle Daten liegen nur lokal in diesem Browser. Regelmäßig exportieren = sicher.</div>
  </div>
  <div class="card">
    <h3>📱 Als Handy-App nutzen</h3>
    <div class="disclaimer">Diese Datei ist eine vollständige Web-App. Fürs Handy: Datei per AirDrop/Cloud aufs Handy übertragen und im Browser öffnen, oder (besser) kostenlos hosten (z. B. GitHub Pages) und dann im Browser „Zum Home-Bildschirm hinzufügen" wählen — sie verhält sich dann wie eine installierte App.</div>
  </div>
  <div class="card">
    <div class="disclaimer">⚕️ Hinweis: Dieses Tool ersetzt keine ärztliche Beratung. Kalorien- und Nährwertangaben sind Richtwerte. Besprich Ernährungs- und Medikamentenfragen (MTX, Mounjaro) mit deinem Arzt — insbesondere bei Dosisänderungen, Nebenwirkungen oder schnellem Gewichtsverlust.</div>
  </div>`;
}
function setPhoto(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const S=200,cv=document.createElement("canvas");
      cv.width=S;cv.height=S;
      const ctx=cv.getContext("2d");
      const m=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,S,S);
      try{state.profile.photo=cv.toDataURL("image/jpeg",0.85);}
      catch(e){alert("Foto konnte nicht verarbeitet werden.");return;}
      save();renderAll();
    };
    img.onerror=()=>alert("Das Bild konnte nicht gelesen werden.");
    img.src=r.result;
  };
  r.readAsDataURL(file);
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="vital-coach-backup-"+todayKey()+".json";
  a.click();
}
function importData(inp){
  const file=inp.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(!d.profile||!d.days)throw 0;
    state=d;save();applyTheme();renderAll();alert("Backup importiert.");
  }catch(e){alert("Datei konnte nicht gelesen werden.");}};
  r.readAsText(file);
}
function resetAll(){
  if(confirm("Wirklich ALLE Daten löschen? Ein Export vorher ist empfohlen."))
  if(confirm("Letzte Sicherheitsfrage: unwiderruflich löschen?")){
    state=defaultState();save();applyTheme();renderAll();
  }
}

/* ================= Init ================= */
function renderAll(){
  if(currentTab==="heute")renderHeute();
  else if(currentTab==="koerper")renderKoerper();
  else if(currentTab==="coach")renderCoach();
  else renderProfil();
  $("#streakNum").textContent=streak();
  $("#streakBadge").classList.toggle("hidden",streak()<1);
  const ab=$("#avatarBtn");
  if(ab)ab.innerHTML=state.profile.photo?`<img class="avatar-img" src="${state.profile.photo}">`:"👤";
}
applyTheme();
renderAll();
window.addEventListener("resize",()=>{if(currentTab==="koerper")drawWeightChart();});

</script>
